<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="sky" x1="32" y1="0" x2="32" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd27a"/>
      <stop offset="1" stop-color="#ff8a3c"/>
    </linearGradient>
    <linearGradient id="sand1" x1="32" y1="26" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff9d4d"/>
      <stop offset="1" stop-color="#e8761f"/>
    </linearGradient>
    <linearGradient id="sand2" x1="32" y1="34" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e06b1c"/>
