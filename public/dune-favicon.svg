    </linearGradient>
    <linearGradient id="sand3" x1="32" y1="44" x2="32" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c2540f"/>
      <stop offset="1" stop-color="#8f3b0a"/>
    </linearGradient>
    <clipPath id="round">
